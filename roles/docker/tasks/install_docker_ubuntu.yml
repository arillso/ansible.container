---
- name: "Ubuntu : create keyrings directory"
  become: true
  ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: "0755"

- name: "Ubuntu : ensure deb822 dependency"
  become: true
  ansible.builtin.apt:
      name: python3-debian
      state: present
      update_cache: true

- name: "Ubuntu : remove legacy GPG key"
  become: true
  ansible.builtin.file:
      path: /etc/apt/trusted.gpg.d/docker.asc
      state: absent

- name: "Ubuntu : remove legacy docker.list"
  become: true
  ansible.builtin.file:
      path: /etc/apt/sources.list.d/docker.list
      state: absent

- name: "Ubuntu : add key"
  ansible.builtin.get_url:
      url: "https://download.docker.com/linux/ubuntu/gpg"
      dest: /etc/apt/keyrings/docker.asc
      mode: "0644"
      force: false

- name: "Ubuntu : add repository"
  become: true
  ansible.builtin.deb822_repository:
      name: docker
      types: deb
      architectures: amd64
      signed_by: /etc/apt/keyrings/docker.asc
      uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
      suites: "{{ ansible_facts['distribution_release'] }}"
      components: stable
      state: present
      enabled: true
  register: docker_repo

- name: "Ubuntu : update apt cache"
  become: true
  ansible.builtin.apt:
      update_cache: true
  when: docker_repo is changed
