---
fleet_enable_gitrepos: false
fleet_enable_bundles: false
fleet_gitrepos: []
# Example configuration:
# - name: "my-app-gitrepo"
#   namespace: "fleet-default"
#   repository: "https://github.com/example/my-app.git"
#   branch: "main"
#   git_username: "myuser"           # für Token-Auth
#   git_token: "mytoken"             # für Token-Auth
#   git_ssh_private_key: "..."       # für SSH-Auth
#   git_known_hosts: "..."           # optional für SSH-Auth
#   paths:
#     - "manifests/"
#   targets:
#     - name: "production"
#       cluster_selector:
#         matchLabels:
#           env: "prod"
#   helm:
#     chart: "./chart"
#     values_files:
#       - "values.yaml"
#   service_account: "fleet-gitrepo-sa"
#   force_update: false
#   polling_interval: "15s"

# Fleet Bundles configuration
fleet_bundles: []
# Example configuration:
# - name: "my-app-bundle"
#   namespace: "fleet-default"
#   resources:
#     - content: |
#         apiVersion: apps/v1
#         kind: Deployment
#         metadata:
#           name: nginx
#         spec:
#           replicas: 1
#           selector:
#             matchLabels:
#               app: nginx
#           template:
#             metadata:
#               labels:
#                 app: nginx
#             spec:
#               containers:
#               - name: nginx
#                 image: nginx:latest
#   targets:
#     - name: "development"
#       cluster_selector:
#         matchLabels:
#           env: "dev"

# Fleet Cluster configuration
fleet_clusters: []
# Example configuration:
# - name: "production-cluster"
#   namespace: "fleet-default"
#   labels:
#     env: "prod"
#     region: "eu-central-1"
#   kubeconfig_secret: "prod-cluster-kubeconfig"

# Fleet Workspace configuration
fleet_workspaces: []
# Example configuration:
# - name: "production-workspace"
#   labels:
#     env: "prod"
#   annotations:
#     description: "Production environment workspace"

# Global Fleet defaults
fleet_defaults:
    namespace: "fleet-default"
    create_namespace: true
    polling_interval: "15s"
    force_update: false
    service_account: "default"

fleet_registration_tokens: []

fleet_api_version: "fleet.cattle.io/v1alpha1"
fleet_state: "present"
fleet_validate_manifests: true
fleet_dry_run: false
fleet_secret_timeout: 60
fleet_resource_timeout: 300

# Async execution for resource deploys with blocking waits (Bundles,
# Clusters). When enabled, k8s applies are fired in parallel
# (async/poll:0) and a single async_status loop waits for completion,
# instead of running each item serially up to fleet_resource_timeout.
# Automatically bypassed in check_mode (async is unsupported there).
fleet_async_enabled: true
# Per-job async timeout in seconds. Should be >= the per-item k8s
# wait_timeout so a job is never reaped while still legitimately waiting.
fleet_async_timeout: 600
# async_status poll retries / delay. retries * delay must comfortably
# exceed fleet_async_timeout so the poller does not give up before jobs do
# (150 * 5 = 750s > 600s timeout, ~25% headroom).
fleet_async_retries: 150
fleet_async_delay: 5

# Fleet authentication parameters (auth entry point) are intentionally left
# undefined here. They are declared as optional in meta/argument_specs.yml and
# resolved with default(omit) where consumed, so no string-omit defaults are set.
