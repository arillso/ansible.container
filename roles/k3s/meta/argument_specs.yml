---
# Argument specifications for K3s role
# Multiple entry points with specific argument requirements

argument_specs:
    main:
        short_description: "Install and configure K3s lightweight Kubernetes"
        description: |
            Main entry point for K3s installation with full configuration options.
            Supports both server and agent roles with manual configuration.
        author: "Simon Bärlocher"
        options:
            k3s_version:
                type: "str"
                required: true
                description: "K3s version to install (e.g., v1.35.2+k3s1)"

            k3s_role:
                type: "str"
                required: true
                choices: ["server", "agent"]
                description: "K3s node role - server (control plane) or agent (worker)"

            k3s_node_name:
                type: "str"
                required: true
                description: "K3s node name (usually inventory_hostname)"

            k3s_server_init:
                type: "bool"
                required: false
                default: false
                description: "Initialize K3s cluster (only for first server node)"

            k3s_server_url:
                type: "str"
                required: false
                default: ""
                description: "K3s server URL for agents and joining servers"

            k3s_token:
                type: "str"
                required: false
                default: ""
                description: "K3s cluster token for authentication"

            k3s_bind_address:
                type: "str"
                required: false
                default: "{{ ansible_default_ipv4.address }}"
                description: "K3s API server bind address"

            k3s_https_listen_port:
                type: "int"
                required: false
                default: 6443
                description: "K3s HTTPS API server listen port"

            k3s_node_ip:
                type: "str"
                required: false
                default: "{{ ansible_default_ipv4.address }}"
                description: "K3s node IP address"

            k3s_tls_san:
                type: "list"
                required: false
                default: []
                elements: "str"
                description: "Additional TLS SANs for API server certificate"

            k3s_node_labels:
                type: "list"
                required: false
                default: []
                elements: "str"
                description: "Node labels to apply (format: key=value)"

            k3s_node_taints:
                type: "list"
                required: false
                default: []
                elements: "str"
                description: "Node taints to apply (format: key=value:effect)"

            k3s_binary_checksum:
                type: "str"
                default: ""
                description: "Expected checksum of the K3s binary"

            k3s_cluster_domain:
                type: "str"
                default: "cluster.local"
                description: "Kubernetes cluster domain"

            k3s_cluster_dns:
                type: "str"
                default: "10.43.0.10"
                description: "Cluster DNS service IP address"

            k3s_cluster_cidr:
                type: "str"
                default: "10.42.0.0/16"
                description: "CIDR range for pod IPs"

            k3s_service_cidr:
                type: "str"
                default: "10.43.0.0/16"
                description: "CIDR range for service IPs"

            k3s_flannel_backend:
                type: "str"
                default: "vxlan"
                choices: ["vxlan", "host-gw", "wireguard-native", "none"]
                description: "Flannel backend type"

            k3s_disable_network_policy:
                type: "bool"
                default: false
                description: "Disable K3s default network policy controller"

            k3s_disable_traefik:
                type: "bool"
                default: false
                description: "Disable built-in Traefik ingress controller"

            k3s_disable_servicelb:
                type: "bool"
                default: false
                description: "Disable built-in service load balancer"

            k3s_disable_metrics_server:
                type: "bool"
                default: false
                description: "Disable built-in metrics server"

            k3s_disable_cloud_controller:
                type: "bool"
                default: false
                description: "Disable built-in cloud controller manager"

            k3s_data_dir:
                type: "str"
                default: "/var/lib/rancher/k3s"
                description: "K3s data directory path"

            k3s_config_dir:
                type: "str"
                default: "/etc/rancher/k3s"
                description: "K3s configuration directory path"

            k3s_token_file:
                type: "str"
                default: "/var/lib/rancher/k3s/server/node-token"
                description: "Path to the K3s node token file"

            k3s_max_pods:
                type: "int"
                default: 110
                description: "Maximum number of pods per node"

            k3s_extra_server_args:
                type: "list"
                elements: "str"
                default: []
                description: "Additional arguments for K3s server"

            k3s_extra_agent_args:
                type: "list"
                elements: "str"
                default: []
                description: "Additional arguments for K3s agent"

            k3s_create_symlinks:
                type: "bool"
                default: true
                description: "Create symlinks for kubectl, crictl, ctr"

            k3s_symlink_force:
                type: "bool"
                default: false
                description: "Force overwrite existing symlinks"

            k3s_symlink_commands:
                type: "list"
                elements: "str"
                default:
                    - kubectl
                    - crictl
                    - ctr
                description: "List of commands to create symlinks for"

            k3s_create_killall_script:
                type: "bool"
                default: true
                description: "Create K3s killall script"

            k3s_environment_vars:
                type: "dict"
                default: {}
                description: "Environment variables for K3s service"

            k3s_kubeconfig_mode:
                type: "str"
                default: "0644"
                description: "File permissions for kubeconfig"

            k3s_kubeconfig_group:
                type: "str"
                default: "root"
                description: "Group ownership of kubeconfig"

            k3s_kubeconfig_owner:
                type: "str"
                default: "root"
                description: "Owner of kubeconfig file"

            k3s_install_dependencies:
                type: "bool"
                default: true
                description: "Install required system packages"

            k3s_required_packages:
                type: "list"
                elements: "str"
                default:
                    - curl
                    - iptables
                    - nfs-common
                description: "Required system packages for K3s"

            k3s_service_enabled:
                type: "bool"
                default: true
                description: "Enable K3s service on boot"

            k3s_service_state:
                type: "str"
                default: "started"
                choices: ["started", "stopped", "restarted", "reloaded"]
                description: "Desired state of K3s service"

            k3s_create_uninstall_script:
                type: "bool"
                default: true
                description: "Create K3s uninstall script"

            k3s_create_bash_completion:
                type: "bool"
                default: true
                description: "Create bash completion for kubectl"

            k3s_security_hardening:
                type: "bool"
                default: true
                description: "Enable K3s security hardening"

            k3s_selinux_custom_policy:
                type: "bool"
                default: false
                description: "Apply custom SELinux policy for K3s"

            k3s_apparmor_profile:
                type: "bool"
                default: false
                description: "Apply AppArmor profile for K3s"

            k3s_debug_security:
                type: "bool"
                default: false
                description: "Enable security debugging output"

            k3s_private_registries:
                type: "list"
                elements: "dict"
                default: []
                description: "Private container registry configurations"

            k3s_auto_facts:
                type: "bool"
                default: true
                description: "Enable automatic facts collection"

    server_init:
        short_description: "K3s server initialization entry point"
        description: |
            Entry point for initializing a new K3s cluster.
            Automatically sets k3s_role=server and k3s_server_init=true.
        author: "Simon Bärlocher"
        options:
            k3s_version:
                type: "str"
                required: true
                description: "K3s version to install"

            k3s_node_name:
                type: "str"
                required: true
                description: "K3s node name"

            k3s_bind_address:
                type: "str"
                required: false
                default: "{{ ansible_default_ipv4.address }}"
                description: "K3s API server bind address"

            k3s_https_listen_port:
                type: "int"
                required: false
                default: 6443
                description: "K3s HTTPS API server listen port"

            k3s_tls_san:
                type: "list"
                required: false
                default: []
                elements: "str"
                description: "Additional TLS SANs for API server"

    server_join:
        short_description: "K3s server join entry point"
        description: |
            Entry point for joining additional servers to existing K3s cluster.
            Automatically sets k3s_role=server and k3s_server_init=false.
        author: "Simon Bärlocher"
        options:
            k3s_version:
                type: "str"
                required: true
                description: "K3s version to install"

            k3s_node_name:
                type: "str"
                required: true
                description: "K3s node name"

            k3s_server_url:
                type: "str"
                required: true
                description: "K3s server URL to join"

            k3s_token:
                type: "str"
                required: true
                description: "K3s cluster token"

            k3s_bind_address:
                type: "str"
                required: false
                default: "{{ ansible_default_ipv4.address }}"
                description: "K3s API server bind address"

            k3s_https_listen_port:
                type: "int"
                required: false
                default: 6443
                description: "K3s HTTPS API server listen port"

    agent:
        short_description: "K3s agent entry point"
        description: |
            Entry point for K3s worker nodes (agents).
            Automatically sets k3s_role=agent.
        author: "Simon Bärlocher"
        options:
            k3s_version:
                type: "str"
                required: true
                description: "K3s version to install"

            k3s_node_name:
                type: "str"
                required: true
                description: "K3s node name"

            k3s_server_url:
                type: "str"
                required: true
                description: "K3s server URL to connect to"

            k3s_token:
                type: "str"
                required: true
                description: "K3s cluster token"

            k3s_node_labels:
                type: "list"
                required: false
                default: []
                elements: "str"
                description: "Node labels to apply"

            k3s_node_taints:
                type: "list"
                required: false
                default: []
                elements: "str"
                description: "Node taints to apply"
