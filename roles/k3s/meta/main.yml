---
# K3s Role Dependencies - Enterprise-grade automatic dependency management
# This role automatically ensures required facts are available

galaxy_info:
    role_name: k3s
    author: Arillso Team
    description: Lightweight Kubernetes distribution with security hardening
    license: MIT
    min_ansible_version: "2.15"
    platforms:
        - name: Ubuntu
          versions:
              - focal
              - jammy
        - name: Debian
          versions:
              - bullseye
              - bookworm
        - name: EL
          versions:
              - "8"
              - "9"
    galaxy_tags:
        - kubernetes
        - k3s
        - container
        - orchestration

dependencies:
    # Facts collection role for K3s cluster state detection
    # This dependency is optional - role will work without it via fallback mechanism
    - role: arillso.system.facts
      vars:
          facts_enable_k3s_detection: true
          facts_k3s_cache_enabled: "{{ k3s_facts_cache_enabled | default(true) }}"
          facts_cache_ttl_k3s: "{{ k3s_facts_cache_ttl | default(300) }}"
          facts_debug_enabled: "{{ k3s_debug_facts | default(false) }}"
          facts_timeout_default: "{{ k3s_facts_health_check_timeout | default(60) }}"
          facts_timeout_api: "{{ k3s_facts_collection_timeout | default(30) }}"
      when: k3s_auto_facts | default(true) | bool
